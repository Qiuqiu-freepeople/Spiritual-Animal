<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>寻觅你的内在灵性动物</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #fcfbfc;
      --text-main: #333333;
      --text-muted: #8e8e8e;
      --border-color: #e8e8e8;
      --card-bg: #ffffff;
      --sel-bg: #f2efe9;
      --font-serif: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
    }
    
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body, html {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: var(--font-serif);
      font-weight: 300;
      letter-spacing: 0.05em;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 容器 */
    #app {
      width: 100%;
      max-width: 600px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
    }

    /* 按钮样式 */
    .btn-outline {
      background: transparent;
      border: 1px solid var(--text-main);
      color: var(--text-main);
      font-family: var(--font-serif);
      font-size: 1rem;
      font-weight: 300;
      padding: 14px 40px;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: all 0.3s ease;
      margin-top: 40px;
      outline: none;
    }
    .btn-outline:hover {
      background: var(--text-main);
      color: #fff;
    }

    /* 首页 */
    .home-title {
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 20px;
      letter-spacing: 0.1em;
    }
    .home-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 50px;
      letter-spacing: 0.08em;
    }

    /* 塔罗牌区 */
    .tarot-title {
      font-size: 1.2rem;
      color: var(--text-main);
      margin-bottom: 60px;
      letter-spacing: 0.1em;
      text-align: center;
    }
    .tarot-sub-title {
      font-size: 1rem;
      color: var(--text-muted);
      margin-bottom: 40px;
      letter-spacing: 0.1em;
    }
    .cards-container {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
      perspective: 1000px;
    }
    .tarot-card {
      width: 120px;
      height: 190px;
      cursor: pointer;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .tarot-card.flipped {
      transform: rotateY(180deg);
      cursor: default;
    }
    .tarot-card.hidden-others {
      display: none;
    }
    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .card-back {
      background-color: #e6e3da;
      border: 1px solid #d9d6ce;
    }
    .card-front {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      transform: rotateY(180deg);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }
    .icon-svg {
      width: 28px;
      height: 28px;
      stroke: #666;
      stroke-width: 1.5;
      fill: none;
    }
    .card-front-text {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--text-main);
      letter-spacing: 0.05em;
    }
    .continue-link {
      font-size: 0.95rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--text-muted);
      padding-bottom: 4px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s ease;
      margin-top: 20px;
    }
    .continue-link.visible {
      opacity: 1;
    }

    /* 问答区 */
    .quiz-container {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      margin-top: -10vh; /* 微微上提 */
    }
    .page-num {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 50px;
      letter-spacing: 0.2em;
    }
    .question-text {
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--text-main);
      margin-bottom: 50px;
      text-align: center;
      line-height: 1.6;
      width: 100%;
    }
    .options-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .option-item {
      width: 100%;
      padding: 20px 24px;
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 1rem;
      color: var(--text-main);
      cursor: pointer;
      transition: all 0.2s ease;
      line-height: 1.5;
    }
    .option-item:active {
      transform: scale(0.98);
    }
    .option-item.selected {
      background-color: var(--sel-bg);
      border-color: var(--sel-bg);
    }

    /* 报告区 */
    .report-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 50px 40px;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.02);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .report-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 16px;
    }
    .report-title {
      font-size: 2.6rem;
      font-weight: 400;
      color: var(--text-main);
      margin-bottom: 24px;
      letter-spacing: 0.15em;
    }
    .report-tarot {
      font-size: 0.9rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .report-tarot .icon-svg {
      width: 16px;
      height: 16px;
    }
    .divider {
      width: 100%;
      height: 1px;
      background-color: var(--border-color);
      margin-bottom: 40px;
    }
    .section-title {
      width: 100%;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 16px;
    }
    .section-content {
      width: 100%;
      font-size: 0.95rem;
      color: #555;
      line-height: 2;
      margin-bottom: 32px;
      text-align: justify;
    }

    @media (max-width: 480px) {
      .report-card { padding: 40px 24px; }
      .tarot-card { width: 100px; height: 160px; }
      .option-item { padding: 16px 20px; }
    }
  </style>
</head>
<body>

/* --- 逻辑与视图渲染 --- */
const app = document.getElementById('app');
let tarotCard = "";
let currentQ = 0;
let userAnswers = [];

function renderHome() {
  app.innerHTML = `
    <div class="home-title">寻觅你的内在灵性动物</div>
    <div class="home-sub">一次关于潜意识与能量的探索</div>
    <button class="btn-outline" onclick="renderTarotStage()">开启旅程</button>
  `;
}

function renderTarotStage() {
  const drawnCards = [];
  while(drawnCards.length < 3) {
    let card = tarotDeck[Math.floor(Math.random() * tarotDeck.length)];
    if(!drawnCards.includes(card)) drawnCards.push(card);
  }

  app.innerHTML = `
    <div class="tarot-sub-title">请凭直觉，抽取一张牌</div>
    <div class="cards-container" id="cards-container">
      ${drawnCards.map((c, index) => `
        <div class="tarot-card" onclick="flipCard(this, '${c}')" data-index="${index}">
          <div class="card-face card-back">${icons.star}</div>
          <div class="card-face card-front">
            ${icons.moon}
            <div class="card-front-text">${c}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="continue-link" id="continue-link" onclick="startQuiz()">带着指引，继续前行</div>
  `;
}

window.flipCard = function(el, cardName) {
  if (tarotCard !== "") return; // 已抽过
  tarotCard = cardName;
  
  // 翻转当前牌
  el.classList.add('flipped');
  
  // 隐藏其他牌并让选中牌居中
  const container = document.getElementById('cards-container');
  const allCards = container.querySelectorAll('.tarot-card');
  allCards.forEach(c => {
    if(c !== el) {
      c.style.opacity = '0';
      setTimeout(() => c.style.display = 'none', 300);
    }
  });

  // 更改上方文字
  document.querySelector('.tarot-sub-title').innerText = "当下的能量映射";
  
  // 显示继续链接
  setTimeout(() => {
    document.getElementById('continue-link').classList.add('visible');
  }, 800);
}

window.startQuiz = function() {
  currentQ = 0;
  userAnswers = [];
  renderQuiz();
}

function renderQuiz() {
  if (currentQ >= questions.length) {
    generateReport();
    return;
  }
  
  const q = questions[currentQ];
  app.innerHTML = `
    <div class="quiz-container">
      <div class="page-num">${currentQ + 1} / 20</div>
      <div class="question-text">${q.q}</div>
      <div class="options-list">
        ${q.o.map((opt, i) => `
          <div class="option-item" onclick="selectOption(this, ${i})">${opt}</div>
        `).join('')}
      </div>
    </div>
  `;
}

window.selectOption = function(el, optIndex) {
  // 防止重复点击
  if (el.parentNode.querySelector('.selected')) return;
  
  el.classList.add('selected');
  userAnswers.push(optIndex);
  
  setTimeout(() => {
    currentQ++;
    renderQuiz();
  }, 400);
}

function generateReport() {
  // 简单统计算法：记录每个动物类别出现的频次
  let scores = new Array(15).fill(0);
  for(let i = 0; i < 20; i++) {
    let animalIdx = animalQ[i][userAnswers[i]];
    if(animalIdx !== undefined) scores[animalIdx]++;
  }
  
  // 找出最高分
  let maxScore = Math.max(...scores);
  let topAnimals = [];
  scores.forEach((s, idx) => { if (s === maxScore) topAnimals.push(idx); });
  
  // 随机取一个最高分的动物
  let finalAnimalIdx = topAnimals[Math.floor(Math.random() * topAnimals.length)];
  let animal = animals[finalAnimalIdx];

  // 塔罗解读提取
  let tMean = tarotMeanings[tarotCard] || `暗含着目前生活中的一次转变或内省期。你可能正在经历能量的重组。`;

  app.innerHTML = `
    <div class="report-card">
      <div class="report-sub">你的内在灵性动物</div>
      <div class="report-title">${animal.name}</div>
      
      <div class="report-tarot">
        ${icons.moon}
        当下能量：${tarotCard}
      </div>

      <div class="divider"></div>

      <div class="section-title">当下境遇</div>
      <div class="section-content">
        【${tarotCard}】的能量环绕着你，${tMean}。<br><br>
        ${animal.situation}
      </div>

      <div class="section-title">灵魂特质</div>
      <div class="section-content">
        ${animal.trait}
      </div>

      <div class="section-title">灵性指引</div>
      <div class="section-content">
        ${animal.guidance}
      </div>

      <button class="btn-outline" style="margin-top:20px;" onclick="location.reload()">重新探索</button>
    </div>
  `;
}
